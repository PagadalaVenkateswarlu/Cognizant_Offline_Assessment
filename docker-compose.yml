version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./app.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: angular_frontend
    ports:
      - "8080:80"